apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-service
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer-service
  template:
    metadata:
      labels:
        app: producer-service
    spec:
      containers:
        - name: producer-service
          image: kafka-lab-producer:24.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-lab-kafka-bootstrap:9092

            - name: OUTBOX_PUBLISHER_FIXED_DELAY_MS
              value: "3000"

---
apiVersion: v1
kind: Service
metadata:
  name: producer-service
  namespace: kafka
spec:
  type: ClusterIP
  selector:
    app: producer-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-service
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-service
  template:
    metadata:
      labels:
        app: consumer-service
    spec:
      containers:
        - name: consumer-service
          image: kafka-lab-consumer:24.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-lab-kafka-bootstrap:9092