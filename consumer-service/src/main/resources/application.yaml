server:
  port: 8081

spring:
  application:
    name: consumer-service

  # 13강: DLT 실패 이력을 저장할 JPA 설정
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true

  # 13강: DLT 실패 이력 저장 실습용 H2 데이터소스
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:testdb'       # In-Memory Mode
    # url: 'jdbc:h2:~/test'		# Embedded Mode
    user: sa
    password:

  # 13강: 실패 이력 저장 결과를 확인할 H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    # 3강: Consumer가 접속할 Kafka Broker
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      # 5강: 메시지를 분산 처리할 Consumer Group
      group-id: study-json-consumer-group

      # 7강: Kafka 메시지 Key를 String으로 역직렬화
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # 7강: Kafka JSON을 이벤트 객체로 역직렬화
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      # 4강: 저장된 Offset이 없으면 가장 오래된 메시지부터 소비
      auto-offset-reset: earliest

      # 8강: 자동 커밋을 끄고 Listener Container가 Offset을 관리
      enable-auto-commit: false

      properties:
        # 7강: Producer 타입 헤더를 사용하지 않고 Consumer 이벤트 타입을 직접 지정
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.jipi.consumerservice.kafka.event.StudyMessageCreatedEvent

        # 7강: 역직렬화를 허용할 이벤트 패키지만 명시
        spring.json.trusted.packages: com.jipi.consumerservice.kafka.event

    # 11강: 실패 메시지를 DLT로 다시 발행할 Consumer 내부 Producer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        # 7강: Producer와 Consumer 이벤트 클래스의 패키지 결합 방지
        spring.json.add.type.headers: false

    listener:
      # 8강: 레코드 한 건을 정상 처리한 뒤 해당 Offset을 커밋
      ack-mode: record

app:
  kafka:
    topic:
      # 3강: Consumer가 구독할 원본 토픽
      study-events: ${KAFKA_TOPIC_STUDY_EVENTS:study.message.created.v1}

      # 11~12강: 재시도 소진 메시지를 소비할 DLT 토픽
      study-events-dlt: ${KAFKA_TOPIC_STUDY_EVENTS_DLT:study.message.created.v1-dlt}
