server:
  port: 8081

spring:
  application:
    name: consumer-service
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:testdb'       # In-Memory Mode
    # url: 'jdbc:h2:~/test'		# Embedded Mode
    user: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    # Kafka Broker 접속 주소
    #
    # KAFKA_BOOTSTRAP_SERVERS 환경변수가 있으면 그 값을 사용하고,
    # 없으면 localhost:9092를 사용한다.
    #
    # 현재 구조:
    # Spring 애플리케이션은 로컬에서 실행
    # Kafka는 Docker에서 9092 포트로 노출
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      # Consumer Group 이름
      #
      # 같은 group-id를 가진 Consumer들은
      # 하나의 메시지를 서로 나누어 처리한다.
      group-id: study-json-consumer-group

      # Kafka의 메시지 Key를 byte[]에서 String으로 변환
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Kafka의 메시지 Value를 byte[]에서 String으로 변환
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer

      # Consumer Group에 저장된 Offset이 없을 때
      # 가장 오래된 메시지부터 읽는다.
      auto-offset-reset: earliest

      # Kafka Client가 일정 시간마다 자동으로 Offset을 커밋하지 않도록 설정
      #
      # Offset 커밋 시점은 Spring Kafka Listener Container가 관리하게 한다.
      enable-auto-commit: false

      properties:
        # Producer가 넣은 타입 헤더를 사용하지 않는다.
        #
        # Producer와 Consumer Java 클래스의
        # 패키지가 서로 다르기 때문이다.
        spring.json.use.type.headers: false

        # 타입 헤더가 없을 때 JSON을 어떤 클래스로
        # 역직렬화할지 지정한다.
        spring.json.value.default.type: com.jipi.consumerservice.kafka.event.StudyMessageCreatedEvent

        # 역직렬화를 허용할 패키지
        #
        # 보안을 위해 전체 "*" 대신
        # 필요한 패키지만 명시한다.
        spring.json.trusted.packages: com.jipi.consumerservice.kafka.event
    # Consumer가 실패 메시지를 DLT에 다시 발행하기 위한 Producer 설정
    producer:
      # 원본 메시지의 Key는 String
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      # 원본 메시지의 Value는 StudyMessageCreatedEvent 객체
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

      properties:
        # Producer와 Consumer 클래스의 패키지 결합을 피한다.
        spring.json.add.type.headers: false

    listener:
      # Listener 메서드가 메시지 한 건을 정상적으로 처리하면
      # 해당 레코드의 Offset을 커밋한다.
      ack-mode: record

app:
  kafka:
    topic:
      # Consumer가 구독할 토픽 이름
      #
      # KAFKA_TOPIC_STUDY_EVENTS 환경변수가 있으면 그 값을 사용하고,
      # 없으면 study.message.created.v1을 사용한다.
      study-events: ${KAFKA_TOPIC_STUDY_EVENTS:study.message.created.v1}
      study-events-dlt: ${KAFKA_TOPIC_STUDY_EVENTS_DLT:study.message.created.v1-dlt}