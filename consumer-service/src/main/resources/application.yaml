server:
  port: 8081

spring:
  application:
    name: consumer-service

  kafka:
    # Kafka Broker 접속 주소
    #
    # KAFKA_BOOTSTRAP_SERVERS 환경변수가 있으면 그 값을 사용하고,
    # 없으면 localhost:9092를 사용한다.
    #
    # 현재 구조:
    # Spring 애플리케이션은 로컬에서 실행
    # Kafka는 Docker에서 9092 포트로 노출
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      # Consumer Group 이름
      #
      # 같은 group-id를 가진 Consumer들은
      # 하나의 메시지를 서로 나누어 처리한다.
      group-id: study-consumer-group

      # Kafka의 메시지 Key를 byte[]에서 String으로 변환
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Kafka의 메시지 Value를 byte[]에서 String으로 변환
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Consumer Group에 저장된 Offset이 없을 때
      # 가장 오래된 메시지부터 읽는다.
      auto-offset-reset: earliest

      # Kafka Client가 일정 시간마다 자동으로 Offset을 커밋하지 않도록 설정
      #
      # Offset 커밋 시점은 Spring Kafka Listener Container가 관리하게 한다.
      enable-auto-commit: false

    listener:
      # Listener 메서드가 메시지 한 건을 정상적으로 처리하면
      # 해당 레코드의 Offset을 커밋한다.
      ack-mode: record

app:
  kafka:
    topic:
        # Consumer가 구독할 토픽 이름
        #
        # KAFKA_TOPIC_STUDY_EVENTS 환경변수가 있으면 그 값을 사용하고,
        # 없으면 study.events.v1을 사용한다.
      study-events: ${KAFKA_TOPIC_STUDY_EVENTS:study.events.v1}