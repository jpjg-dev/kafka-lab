server:
  port: 8080

spring:
  application:
    name: producer-service

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true

  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:testdb'      # In-Memory Mode
    # url: 'jdbc:h2:~/test'		# Embedded Mode
    user: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # 18강: Broker ACK와 내구성
      acks: ${KAFKA_PRODUCER_ACKS:all}

      # 21강: Producer 배치 크기
      batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:32768}

      # 21강: 메시지 압축 방식
      compression-type: ${KAFKA_PRODUCER_COMPRESSION_TYPE:lz4}

      properties:
        # 19강: Idempotent Producer
        enable.idempotence: ${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:true}

        # 20강: 메시지 순서 보장과 동시 전송 요청 수
        max.in.flight.requests.per.connection: ${KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS:5}

        # 7강: Producer 타입 헤더 비활성화
        spring.json.add.type.headers: false

app:
  outbox:
    publisher:
      # 17강: Outbox Publisher 실행 간격
      fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:30000}
  kafka:
    topic:
      # 2강: Producer 발행 토픽
      study-events: ${KAFKA_TOPIC_STUDY_EVENTS:study.message.created.v1}
